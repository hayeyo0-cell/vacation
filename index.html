<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>휴가장부</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="theme-color" content="#3478f6" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #f5f6f8;
    color: #1a1a1a;
    -webkit-tap-highlight-color: transparent;
  }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel (JSX를 브라우저에서 바로 변환) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (모듈형 SDK, CDN) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where,
    doc,
    updateDoc,
    serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBrBlZXbA-Tt68cnXk2XKQYms7wI3owCVI",
    authDomain: "vacation-31f9f.firebaseapp.com",
    projectId: "vacation-31f9f",
    storageBucket: "vacation-31f9f.firebasestorage.app",
    messagingSenderId: "1015564758748",
    appId: "1:1015564758748:web:11561d3fcf11f564308e19"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COLLECTION = "vacations";

  // app.js(Babel 스크립트)에서 window.VacationAPI.xxx() 형태로 호출
  window.VacationAPI = {
    // 특정 날짜의 휴가 기록 전체 조회 (취소된 것 포함)
    async getByDate(dateStr) {
      const q = query(collection(db, COLLECTION), where("date", "==", dateStr));
      const snap = await getDocs(q);
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    },
    // 월 범위 조회 (달력용) - startStr, endStr: "YYYY-MM-DD"
    async getByRange(startStr, endStr) {
      const q = query(
        collection(db, COLLECTION),
        where("date", ">=", startStr),
        where("date", "<=", endStr)
      );
      const snap = await getDocs(q);
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    },
    // 새 휴가 등록
    async add(record) {
      const ref = await addDoc(collection(db, COLLECTION), {
        ...record,
        status: "정상",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
      return ref.id;
    },
    // 기존 기록 수정 (본인 것만 - 화면단에서 제한)
    async update(id, patch) {
      await updateDoc(doc(db, COLLECTION, id), {
        ...patch,
        updatedAt: serverTimestamp(),
      });
    },
    // 취소 처리 (삭제 아님, 상태만 변경)
    async cancel(id) {
      await updateDoc(doc(db, COLLECTION, id), {
        status: "취소됨",
        updatedAt: serverTimestamp(),
      });
    },
  };

  window.__firestoreReady = true;
  window.dispatchEvent(new Event("firestore-ready"));
</script>

<!-- 실제 앱 코드 (JSX) -->
<script type="text/babel" src="app.js"></script>

<!-- PWA 설치를 위한 서비스워커 등록 -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.warn("서비스워커 등록 실패:", err);
      });
    });
  }
</script>
</body>
</html>
