<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>휴가장부</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#1b3a5c" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #f7f4ee;
    color: #1a1a1a;
    -webkit-tap-highlight-color: transparent;
  }
  #root { min-height: 100vh; }

  /* PC 등 넓은 화면에서는 모바일 폭으로 가운데 정렬 (관리자는 주로 PC에서 사용) */
  @media (min-width: 640px) {
    body { background: #e7e2d5; }
    #root > div {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      box-shadow: 0 0 50px rgba(0,0,0,0.12);
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel (JSX를 브라우저에서 바로 변환) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (모듈형 SDK, CDN) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    getDoc,
    setDoc,
    query,
    where,
    doc,
    updateDoc,
    deleteDoc,
    serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBrBlZXbA-Tt68cnXk2XKQYms7wI3owCVI",
    authDomain: "vacation-31f9f.firebaseapp.com",
    projectId: "vacation-31f9f",
    storageBucket: "vacation-31f9f.firebasestorage.app",
    messagingSenderId: "1015564758748",
    appId: "1:1015564758748:web:11561d3fcf11f564308e19"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COLLECTION = "vacations";
  const APPROVAL_COLLECTION = "approvals";

  // app.js(Babel 스크립트)에서 window.VacationAPI.xxx() 형태로 호출
  window.VacationAPI = {
    // 특정 날짜의 휴가 기록 전체 조회 (취소된 것 포함)
    async getByDate(dateStr) {
      const q = query(collection(db, COLLECTION), where("date", "==", dateStr));
      const snap = await getDocs(q);
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    },
    // 월 범위 조회 (달력용) - startStr, endStr: "YYYY-MM-DD"
    async getByRange(startStr, endStr) {
      const q = query(
        collection(db, COLLECTION),
        where("date", ">=", startStr),
        where("date", "<=", endStr)
      );
      const snap = await getDocs(q);
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    },
    // 새 휴가 등록
    async add(record) {
      const ref = await addDoc(collection(db, COLLECTION), {
        ...record,
        status: "정상",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
      return ref.id;
    },
    // 기존 기록 수정 (본인 것만 - 화면단에서 제한)
    async update(id, patch) {
      await updateDoc(doc(db, COLLECTION, id), {
        ...patch,
        updatedAt: serverTimestamp(),
      });
    },
    // 취소 처리 (삭제 아님, 상태만 변경)
    async cancel(id) {
      await updateDoc(doc(db, COLLECTION, id), {
        status: "취소됨",
        updatedAt: serverTimestamp(),
      });
    },
    // 완전 삭제 (관리자 전용 - 되돌릴 수 없음)
    async remove(id) {
      await deleteDoc(doc(db, COLLECTION, id));
    },
    // 중간관리자 확인 도장
    async confirm(id, managerName) {
      await updateDoc(doc(db, COLLECTION, id), {
        confirmedBy: managerName,
        confirmedAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
    },
  };

  // 사용자 승인 관련 API
  window.ApprovalAPI = {
    // 최초 등록 시 승인 요청 생성/갱신 (직원ID 기준, 이미 있으면 pending으로 갱신)
    async request(record) {
      await setDoc(
        doc(db, APPROVAL_COLLECTION, record.id),
        {
          name: record.name,
          branch: record.branch,
          status: "pending",
          requestedAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
        },
        { merge: true }
      );
    },
    // 특정 직원의 승인 상태 조회
    async getStatus(id) {
      const snap = await getDoc(doc(db, APPROVAL_COLLECTION, id));
      return snap.exists() ? snap.data() : null;
    },
    // 대기중 목록 조회 (관리자용)
    async listPending() {
      const q = query(collection(db, APPROVAL_COLLECTION), where("status", "==", "pending"));
      const snap = await getDocs(q);
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    },
    // 승인/거절 처리 (관리자용)
    async setStatus(id, status) {
      await updateDoc(doc(db, APPROVAL_COLLECTION, id), {
        status,
        updatedAt: serverTimestamp(),
      });
    },
  };

  window.__firestoreReady = true;
  window.dispatchEvent(new Event("firestore-ready"));
</script>

<!-- 실제 앱 코드 (JSX) -->
<script type="text/babel" src="app.js"></script>

<!-- PWA 설치를 위한 서비스워커 등록 -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.warn("서비스워커 등록 실패:", err);
      });
    });
  }
</script>
</body>
</html>
